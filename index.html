<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Natal Chart Calculator</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 2rem auto;
      padding: 1rem;
      background: #f9fafb;
      color: #111827;
    }
    h1 {
      text-align: center;
      color: #1e40af;
    }
    form {
      display: grid;
      gap: 1.2rem;
      background: white;
      padding: 1.5rem;
      border-radius: 0.75rem;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
    label {
      display: grid;
      gap: 0.4rem;
      font-weight: 500;
    }
    input {
      padding: 0.75rem;
      font-size: 1rem;
      border: 1px solid #d1d5db;
      border-radius: 0.375rem;
    }
    button {
      padding: 0.9rem;
      font-size: 1.1rem;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover {
      background: #4338ca;
    }
    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    #result {
      margin-top: 2rem;
      padding: 1.5rem;
      background: white;
      border-radius: 0.75rem;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      white-space: pre-wrap;
    }
    #result h2 {
      margin-top: 0;
      color: #1e40af;
    }
    #error {
      margin-top: 1rem;
      color: #dc2626;
      font-weight: 500;
    }
    .planet {
      margin: 0.8rem 0;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #e5e7eb;
    }
    .planet:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>
  <h1>Western Natal Chart</h1>
  <p>Enter your birth details to see planetary positions (Sun, Moon, Ascendant, etc.).</p>

  <form id="birthForm">
    <label>
      Year
      <input type="number" name="year" required min="1900" max="2100" value="1990" />
    </label>
    <label>
      Month (1–12)
      <input type="number" name="month" required min="1" max="12" value="3" />
    </label>
    <label>
      Day (1–31)
      <input type="number" name="date" required min="1" max="31" value="4" />
    </label>
    <label>
      Hour (0–23)
      <input type="number" name="hours" required min="0" max="23" value="14" />
    </label>
    <label>
      Minute (0–59)
      <input type="number" name="minutes" required min="0" max="59" value="30" />
    </label>
    <label>
      Latitude (e.g. Denver: 39.7392)
      <input type="number" step="any" name="latitude" required value="39.7392" />
    </label>
    <label>
      Longitude (e.g. Denver: -104.9903)
      <input type="number" step="any" name="longitude" required value="-104.9903" />
    </label>
    <label>
      Timezone offset (e.g. -7.0 MST, -6.0 MDT)
      <input type="number" step="any" name="timezone" required value="-7.0" />
    </label>

    <button type="submit" id="submitBtn">Calculate Chart</button>
  </form>

  <div id="result"></div>
  <div id="error"></div>

  <script>
    const form = document.getElementById('birthForm');
    const resultDiv = document.getElementById('result');
    const errorDiv = document.getElementById('error');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Calculating...';
      resultDiv.innerHTML = '';
      errorDiv.innerHTML = '';

      const formData = new FormData(form);
      const payload = {
        year: parseInt(formData.get('year')),
        month: parseInt(formData.get('month')),
        date: parseInt(formData.get('date')),
        hours: parseInt(formData.get('hours')),
        minutes: parseInt(formData.get('minutes')),
        seconds: 0,
        latitude: parseFloat(formData.get('latitude')),
        longitude: parseFloat(formData.get('longitude')),
        timezone: parseFloat(formData.get('timezone')),
      };

      try {
        const response = await fetch('/api/chart', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error(`Server error: ${response.status} ${response.statusText}`);
        }

        const data = await response.json();

        let html = '<h2>Your Western Natal Positions</h2>';

        if (data.output && Array.isArray(data.output)) {
          data.output.forEach(item => {
            const name = item.planet?.en || 'Unknown';
            const fullDeg = item.fullDegree || 0;
            const normDeg = item.normDegree || (fullDeg % 30);
            let sign = item.sign?.en || 'Unknown';

            // Fallback if sign missing
            if (sign === 'Unknown') {
              const signs = ['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
              sign = signs[Math.floor(fullDeg / 30) % 12];
            }

            const retro = item.isRetro === 'True' ? ' (Retrograde)' : '';

            html += `
              <div class="planet">
                <strong>${name}</strong>: ${sign} ${normDeg.toFixed(2)}°${retro}<br>
                <small>Full degree: ${fullDeg.toFixed(2)}°</small>
              </div>
            `;
          });
        } else {
          html += '<p>No planetary data returned. Raw response:</p><pre>' + JSON.stringify(data, null, 2) + '</pre>';
        }

        resultDiv.innerHTML = html;
      } catch (err) {
        errorDiv.innerHTML = 'Error: ' + err.message + '<br>Check console for details (F12 → Console).';
        console.error(err);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Calculate Chart';
      }
    });
  </script>
</body>
</html>
